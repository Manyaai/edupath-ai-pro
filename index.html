<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PathFinder AI</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="nav">
  <div class="logo" onclick="location.href='index.html'">PathFinder</div>
  <button onclick="goDashboard()" class="nav-btn">Dashboard</button>
</header>

<section class="hero">
  <h1>Stop guessing your career.</h1>
  <p>Start understanding it.</p>
  <p id="debug"></p>
</section>

<div class="container">

  <div class="card">

    <form id="form">

      <label>Interest Area</label>
      <select id="interest">
        <option>Technology</option>
        <option>Business</option>
        <option>Creative</option>
        <option>Healthcare</option>
      </select>

      <label>Work Style</label>
      <select id="style">
        <option>Analytical</option>
        <option>Creative</option>
        <option>People-Oriented</option>
        <option>Hands-On</option>
      </select>

      <label>Risk Appetite</label>
      <select id="risk">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <button type="submit">Generate My Career Blueprint</button>

    </form>

  </div>

</div>

<script src="data/careers.js"></script>
<script src="js/engine.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
